name: Predeploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests

      - name: Validate deployment JSON
        run: |
          python -m json.tool demo/vercel.json >/dev/null
          python -m json.tool railway.json >/dev/null

      - name: Check normalized indexing inputs
        run: |
          count="$(find data/normalized -name '*.json' | wc -l)"
          echo "Normalized JSON files: $count"
          test "$count" -gt 0
